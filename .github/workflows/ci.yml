name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime deps
        run: pip install -r requirements.txt
      - name: Compile-check all Python sources
        run: python -m compileall -q benchmark common.py run_benchmark.py
      - name: YAML lint
        run: |
          pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('models.yaml'))"
      - name: JSON lint
        run: python -c "import json; json.load(open('golden/expectations.json'))"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
